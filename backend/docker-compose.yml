version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contasolutions-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: contasolutions-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: contasolutions
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
